<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Influencer Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="background"></div>
        <div class="character">
            <img id="character-image" src="static-avatar.jpg" alt="Influencer">
            <video id="character-video" autoplay muted loop hidden></video>
        </div>
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="Say something...">
            <button id="send-button">Send</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
